// Shopify configuration
const shopifyDomain = '1bdd45-30.myshopify.com';
const storefrontAccessToken = 'b822779326ff05c1082e8a729db56fa0';
// Function to get cart ID from IndexedDB
async function getCartId() {
  return new Promise((resolve, reject) => {
    const dbName = 'smootify';
    const storeName = 'storefront';
    const request = indexedDB.open(dbName);
    request.onsuccess = function(event) {
      const db = event.target.result;
      const transaction = db.transaction([storeName], 'readonly');
      const store = transaction.objectStore(storeName);
      const getRequest = store.get('_cart_id');
      getRequest.onsuccess = function(event) {
        resolve(event.target.result);
      };
      getRequest.onerror = function(event) {
        reject('Error getting cart ID from IndexedDB');
      };
    };
    request.onerror = function(event) {
      reject('Error opening IndexedDB');
    };
  });
}
// Helper functions
function getNumericId(gid) {
  if (!gid) return null;
  try {
    const parts = gid.split('/');
    return parseInt(parts[parts.length - 1]);
  } catch (e) {
    console.error("Error parsing numeric ID from GID:", gid, e);
    return null;
  }
}
function convertPriceToCents(price) {
  if (price === null || price === undefined || isNaN(parseFloat(price))) return null;
  return Math.round(parseFloat(price) * 100);
}
// Function to fetch cart data from Shopify
async function fetchCartData(cartId) {
  const graphqlQuery = `
    query GetCartDetails($cartId: ID!) {
      cart(id: $cartId) {
        id
        note
        attributes { key value }
        cost {
          totalAmount { amount currencyCode }
          subtotalAmount { amount currencyCode }
        }
        totalQuantity
        discountCodes { code applicable }
        discountAllocations {
          discountedAmount { amount currencyCode }
        }
        lines(first: 50) {
          edges {
            node {
              id
              quantity
              attributes { key value }
              cost {
                amountPerQuantity { amount currencyCode }
                compareAtAmountPerQuantity { amount currencyCode }
                totalAmount { amount currencyCode }
              }
              discountAllocations {
                discountedAmount { amount currencyCode }
              }
              merchandise {
                ... on ProductVariant {
                  id
                  sku
                  title
                  requiresShipping
                  taxable
                  weight
                  weightUnit
                  image {
                    url
                    altText
                    width
                    height
                  }
                  selectedOptions { name value }
                  quantityRule {
                    minimum
                    maximum
                    increment
                  }
                  product {
                    id
                    title
                    vendor
                    handle
                    productType
                    descriptionHtml
                  }
                }
              }
            }
          }
        }
      }
    }
  `;
  const response = await fetch(`https://${shopifyDomain}/api/2025-04/graphql.json`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Shopify-Storefront-Access-Token': storefrontAccessToken
    },
    body: JSON.stringify({
      query: graphqlQuery,
      variables: { cartId }
    })
  });
  if (!response.ok) {
    const errorBody = await response.text();
    console.error(`GraphQL request failed: ${response.status} ${response.statusText}`, errorBody);
    throw new Error(`Failed to fetch cart data: ${response.statusText}`);
  }
  const jsonResponse = await response.json();
  if (jsonResponse.errors) {
    console.error("GraphQL Errors:", JSON.stringify(jsonResponse.errors, null, 2));
    throw new Error("Error fetching cart data from Shopify GraphQL.");
  }
  return jsonResponse;
}
// Function to prepare cart payload according to Yampi example
function prepareCartPayload(cartData) {
  const cart = cartData?.data?.cart;
  if (!cart) {
    console.error("Cart data is missing or invalid in GraphQL response:", cartData);
    throw new Error("Invalid cart data received from Shopify.");
  }
  const cartToken = cart.id ? cart.id.split('?key=')[1] : null;
  if (!cartToken) {
    console.error("Could not extract cart token from cart ID:", cart.id);
    throw new Error("Cart token is missing.");
  }
  const cartAttributes = {};
  cart.attributes?.forEach(attr => {
    cartAttributes[attr.key] = attr.value;
  });
  const cartLevelTotalDiscount = cart.discountAllocations?.reduce((sum, alloc) => {
    return sum + parseFloat(alloc.discountedAmount?.amount || 0);
  }, 0) || 0;
  const items = cart.lines?.edges?.map(edge => {
    const node = edge.node;
    const merchandise = node.merchandise;
    const product = merchandise?.product;
    if (!merchandise) return null;
    const variantId = getNumericId(merchandise.id);
    const productId = getNumericId(product?.id);
    const lineKey = node.id ? node.id.split('?cart=')[0].split('/').pop() : null;
    const properties = {};
    node.attributes?.forEach(attr => {
      properties[attr.key] = attr.value;
    });
    const lineLevelTotalDiscount = node.discountAllocations?.reduce((sum, alloc) => {
      return sum + parseFloat(alloc.discountedAmount?.amount || 0);
    }, 0) || 0;
    let grams = 0;
    if (merchandise.weight && merchandise.weightUnit) {
      if (merchandise.weightUnit === 'KILOGRAMS' || merchandise.weightUnit === 'KG') {
        grams = merchandise.weight * 1000;
      } else if (merchandise.weightUnit === 'GRAMS' || merchandise.weightUnit === 'G') {
        grams = merchandise.weight;
      } else if (merchandise.weightUnit === 'POUNDS' || merchandise.weightUnit === 'LB') {
        grams = merchandise.weight * 453.592;
      } else if (merchandise.weightUnit === 'OUNCES' || merchandise.weightUnit === 'OZ') {
        grams = merchandise.weight * 28.3495;
      }
      grams = Math.round(grams);
    }
    return {
      id: variantId,
      properties,
      quantity: node.quantity,
      variant_id: variantId,
      key: lineKey,
      title: merchandise.title || product?.title || "N/A",
      price: convertPriceToCents(node.cost?.amountPerQuantity?.amount),
      original_price: convertPriceToCents(node.cost?.compareAtAmountPerQuantity?.amount),
      presentment_price: convertPriceToCents(node.cost?.amountPerQuantity?.amount),
      discounted_price: convertPriceToCents(node.cost?.amountPerQuantity?.amount),
      line_price: convertPriceToCents(node.cost?.totalAmount?.amount),
      original_line_price: convertPriceToCents(node.cost?.compareAtAmountPerQuantity?.amount * node.quantity),
      total_discount: convertPriceToCents(lineLevelTotalDiscount),
      discounts: [],
      sku: merchandise.sku || "",
      grams,
      vendor: product?.vendor || "",
      taxable: merchandise.taxable === true,
      product_id: productId,
      product_has_only_default_variant: true,
      gift_card: product?.productType?.toLowerCase().includes('gift') || false,
      final_price: convertPriceToCents(node.cost?.amountPerQuantity?.amount),
      final_line_price: convertPriceToCents(node.cost?.totalAmount?.amount),
      url: product?.handle ? `/products/${product.handle}?variant=${variantId}` : "",
      featured_image: merchandise.image ? {
        aspect_ratio: merchandise.image.width && merchandise.image.height ? merchandise.image.width / merchandise.image.height : null,
        alt: merchandise.image.altText || product?.title || "",
        height: merchandise.image.height || null,
        url: merchandise.image.url || "",
        width: merchandise.image.width || null
      } : null,
      image: merchandise.image?.url || "",
      handle: product?.handle || "",
      requires_shipping: merchandise.requiresShipping === true,
      product_type: product?.productType || "",
      product_title: product?.title || "",
      product_description: product?.descriptionHtml || "",
      variant_title: merchandise.title || null,
      variant_options: merchandise.selectedOptions?.map(opt => opt.value) || [],
      options_with_values: merchandise.selectedOptions?.map(opt => ({ name: opt.name, value: opt.value })) || [],
      line_level_discount_allocations: [],
      line_level_total_discount: convertPriceToCents(lineLevelTotalDiscount),
      quantity_rule: merchandise.quantityRule ? {
        min: merchandise.quantityRule.minimum,
        max: merchandise.quantityRule.maximum,
        increment: merchandise.quantityRule.increment
      } : null,
      has_components: false
    };
  }).filter(item => item !== null);
  const requiresShipping = items.some(item => item.requires_shipping);
  const finalPayload = {
    shop: "shop.iwowatch.com.br", // Using custom domain as per user feedback and original script
    cart_payload: {
      token: cartToken,
      note: cart.note || "",
      attributes: cartAttributes,
      original_total_price: items.reduce((sum, item) => sum + (item.original_line_price || 0), 0),
      total_price: convertPriceToCents(cart.cost?.totalAmount?.amount),
      total_discount: convertPriceToCents(cartLevelTotalDiscount),
      total_weight: items.reduce((sum, item) => sum + (item.grams || 0) * item.quantity, 0),
      item_count: cart.totalQuantity,
      items,
      requires_shipping: requiresShipping,
      currency: cart.cost?.totalAmount?.currencyCode || "BRL",
      items_subtotal_price: convertPriceToCents(cart.cost?.subtotalAmount?.amount),
      cart_level_discount_applications: []
    }
  };
  return finalPayload;
}
// Function to send final request and get checkout URL
async function getCheckoutUrl(payload) {
  console.log('Payload enviado para Yampi:', JSON.stringify(payload, null, 2));
  const response = await fetch('https://api.dooki.com.br/v2/public/shopify/cart', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(payload)
  });
  return await response.json();
}
// Main function to handle the checkout process
async function handleCheckout(event) {
  event.preventDefault();
  event.stopPropagation();
  try {
    const cartId = await getCartId();
    const cartData = await fetchCartData(cartId);
    const payload = prepareCartPayload(cartData);
    const checkoutData = await getCheckoutUrl(payload);
    // Log the response from Dooki API for debugging
    console.log('Resposta da API Dooki (Yampi):', JSON.stringify(checkoutData, null, 2));
    // Check if the redirect URL exists before attempting redirection
    if (checkoutData && checkoutData.checkout_direct_url) {
      window.location.href = checkoutData.checkout_direct_url;
    } else {
      console.error('Erro: checkout_direct_url não encontrado na resposta da API Dooki.');
      alert('Ocorreu um erro ao obter o link de checkout. Por favor, tente novamente ou contate o suporte.');
    }
  } catch (error) {
    console.error('Error during checkout process:', error);
    alert('Ocorreu um erro ao processar o checkout. Por favor, tente novamente.');
  }
}
// Function to intercept the Shopify checkout button
function interceptCheckoutButton() {
  const checkoutSelectors = [
    'button[name="checkout"]',
    'input[name="checkout"]',
    '[href="/checkout"]',
    'form[action="/cart"] input[type="submit"]',
    'form[action="/cart"] button[type="submit"]',
    '.w-button[value="Finalizar Compra"]',
    'input[value="Finalizar Compra"]',
    'button.button-6',
    '[data-value="Finalizar Compra"]'
  ];
  const checkoutButtons = document.querySelectorAll(checkoutSelectors.join(', '));
  checkoutButtons.forEach(button => {
    button.addEventListener('click', handleCheckout);
    console.log('Intercepted button:', button);
  });
  if (checkoutButtons.length === 0) {
    console.log('No checkout buttons found. Selectors used:', checkoutSelectors);
  }
}
document.addEventListener('DOMContentLoaded', interceptCheckoutButton);
setTimeout(interceptCheckoutButton, 1000);
</script>
